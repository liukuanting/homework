<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽球臨打報名</title>
  <meta name="description" content="羽球臨打場次瀏覽、會員登入、即時報名與管理後台。">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script defer src="app.js"></script>
</head>
<body data-page="home">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-badge">BT</span>
      <span>羽球臨打報名</span>
    </a>
    <nav class="site-nav">
      <a href="index.html" class="is-active">首頁</a>
      <a href="dashboard.html">會員中心</a>
      <a href="admin.html">管理後台</a>
      <a href="login.html">會員登入</a>
      <a href="register.html">註冊</a>
    </nav>
    <div class="auth-actions">
      <span id="navUserEmail" class="user-pill"></span>
      <button id="logoutButton" class="button button-secondary is-hidden" type="button">登出</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="hero hero-simple">
      <div class="hero-copy">
        <p class="eyebrow">Badminton Booking</p>
        <h1>今晚想打球，這裡直接找場。</h1>
        <p class="hero-text">看場次、看級數、看費用，登入後就能直接報名。</p>
        <div class="hero-actions">
          <a class="button" href="login.html">會員登入</a>
          <a class="button button-secondary" href="register.html">立即註冊</a>
        </div>
      </div>

      <div class="hero-side">
        <div class="hero-visual glass-card hero-image-card">
          <img class="hero-shuttlecock hero-shuttlecock-large" src="shuttlecock.svg" alt="羽球圖案">
        </div>
        <div class="hero-panel glass-card">
          <div class="metric-row">
            <div>
              <span class="metric-label">開放場次</span>
              <strong id="heroSessionCount">--</strong>
            </div>
            <div>
              <span class="metric-label">剩餘名額</span>
              <strong id="heroSlotsCount">--</strong>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section-header">
      <div>
        <p class="eyebrow">Open Sessions</p>
        <h2>近期臨打場次</h2>
      </div>
      <div class="filter-row compact">
        <select id="homeLevelFilter"></select>
      </div>
    </section>

    <section id="homeSessions" class="card-grid"></section>
  </main>

  <footer class="site-footer">
    <p>Badminton Booking System by HTML + JavaScript + Supabase</p>
  </footer>
</body>
</html>
