<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台</title>
  <meta name="description" content="管理行程、檔期與訂單。">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script defer src="app.js"></script>
</head>
<body data-page="admin">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-badge">BT</span>
      <span>羽球臨打報名</span>
    </a>
    <nav class="site-nav">
      <a href="index.html">首頁</a>
      <a href="dashboard.html">會員中心</a>
      <a href="admin.html" class="is-active">管理後台</a>
      <a href="login.html">會員登入</a>
      <a href="register.html">註冊</a>
    </nav>
    <div class="auth-actions">
      <span id="navUserEmail" class="user-pill"></span>
      <button id="logoutButton" class="button button-secondary is-hidden" type="button">登出</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="section-header">
      <div>
        <p class="eyebrow">Admin Side</p>
        <h1>管理後台</h1>
      </div>
      <div class="glass-card welcome-card">
        <p>管理行程、檔期與訂單資料。</p>
        <strong id="adminUserName">讀取中...</strong>
      </div>
    </section>

    <section class="glass-card">
      <div class="section-header stacked">
        <div>
          <p class="eyebrow">Debug</p>
          <h2>管理者除錯資訊</h2>
        </div>
      </div>
      <div id="adminDebugPanel" class="table-shell"></div>
    </section>

    <section class="glass-card">
      <div class="section-header stacked">
        <div>
          <p class="eyebrow">Tour Management</p>
          <h2>行程管理</h2>
        </div>
      </div>
      <form id="tourForm" class="form-card admin-tour-form">
        <input id="tourId" type="hidden">
        <input id="sessionId" type="hidden">
        <label>
          <span>行程標題</span>
          <input id="tourTitle" type="text" required>
        </label>
        <label>
          <span>時間</span>
          <input id="tourSchedule" type="text" placeholder="例如：4/12 19:00-21:00" required>
        </label>
        <label>
          <span>級數</span>
          <input id="tourLevel" type="number" min="1" max="18" placeholder="1 到 18" required>
        </label>
        <label>
          <span>地點</span>
          <input id="tourLocation" type="text" required>
        </label>
        <label>
          <span>費用</span>
          <input id="tourPrice" type="number" min="0" required>
        </label>
        <label>
          <span>名額</span>
          <input id="tourCapacity" type="number" min="1" required>
        </label>
        <label class="form-span-2">
          <span>說明</span>
          <textarea id="tourDescription" rows="4"></textarea>
        </label>
        <div class="inline-actions form-span-2">
          <button class="button" type="submit">儲存行程</button>
          <button id="tourResetButton" class="button button-secondary" type="button">清空表單</button>
        </div>
      </form>
      <div id="adminTourMessage" class="message-box"></div>
      <div id="tourTable" class="table-shell"></div>
    </section>

    <section class="glass-card">
      <div class="section-header">
        <div>
          <p class="eyebrow">Order Management</p>
          <h2>訂單管理</h2>
        </div>
        <div class="filter-row compact">
          <input id="orderDateFilter" type="date">
          <select id="orderTourFilter">
            <option value="">全部行程</option>
          </select>
          <button id="refreshOrders" class="button button-secondary" type="button">重新整理</button>
        </div>
      </div>
      <div id="adminOrderTable" class="table-shell"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Badminton Booking System by HTML + JavaScript + Supabase</p>
  </footer>
</body>
</html>
