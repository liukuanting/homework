<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員註冊</title>
  <meta name="description" content="建立羽球臨打會員帳號。">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script defer src="app.js"></script>
</head>
<body data-page="register">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-badge">BT</span>
      <span>羽球臨打報名</span>
    </a>
    <nav class="site-nav">
      <a href="index.html">首頁</a>
      <a href="dashboard.html">會員中心</a>
      <a href="admin.html">管理後台</a>
      <a href="login.html">會員登入</a>
      <a href="register.html" class="is-active">註冊</a>
    </nav>
    <div class="auth-actions">
      <span id="navUserEmail" class="user-pill"></span>
      <button id="logoutButton" class="button button-secondary is-hidden" type="button">登出</button>
    </div>
  </header>

  <main class="page-shell auth-shell">
    <section class="auth-panel glass-card">
      <div class="section-header stacked">
        <div>
          <p class="eyebrow">Register</p>
          <h1>建立會員帳號</h1>
        </div>
      </div>

      <div class="auth-grid single-column">
        <form id="registerForm" class="form-card">
          <label>
            <span>姓名</span>
            <input id="registerName" type="text" placeholder="王小明" required>
          </label>
          <label>
            <span>Email</span>
            <input id="registerEmail" type="email" placeholder="name@example.com" required>
          </label>
          <label>
            <span>密碼</span>
            <input id="registerPassword" type="password" placeholder="至少 6 碼" required>
          </label>
          <button class="button" type="submit">註冊會員</button>
        </form>
      </div>

      <p class="auth-helper">已經有帳號？ <a href="login.html">回到登入</a></p>
      <div id="registerMessage" class="message-box"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Badminton Booking System by HTML + JavaScript + Supabase</p>
  </footer>
</body>
</html>
