<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員中心</title>
  <meta name="description" content="會員瀏覽場次、快速報名與查看訂單紀錄。">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script defer src="app.js"></script>
</head>
<body data-page="dashboard">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-badge">BT</span>
      <span>羽球臨打報名</span>
    </a>
    <nav class="site-nav">
      <a href="index.html">首頁</a>
      <a href="dashboard.html" class="is-active">會員中心</a>
      <a href="admin.html">管理後台</a>
      <a href="login.html">會員登入</a>
      <a href="register.html">註冊</a>
    </nav>
    <div class="auth-actions">
      <span id="navUserEmail" class="user-pill"></span>
      <button id="logoutButton" class="button button-secondary is-hidden" type="button">登出</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="section-header">
      <div>
        <p class="eyebrow">Member Center</p>
        <h1>會員中心</h1>
      </div>
      <div class="glass-card welcome-card">
        <p>登入成功後會直接進到這裡。</p>
        <strong id="dashboardUserName">讀取中...</strong>
      </div>
    </section>

    <section class="glass-card">
      <div class="section-header stacked">
        <div>
          <p class="eyebrow">Sessions</p>
          <h2>可報名場次</h2>
        </div>
      </div>
      <div class="filter-row">
        <input id="sessionDateFilter" type="date">
        <select id="sessionLevelFilter"></select>
      </div>
      <div id="dashboardSessions" class="card-grid compact-grid"></div>
      <div id="bookingMessage" class="message-box"></div>
    </section>

    <section class="glass-card">
      <div class="section-header stacked">
        <div>
          <p class="eyebrow">Order History</p>
          <h2>訂單紀錄</h2>
        </div>
      </div>
      <div id="orderHistory" class="table-shell"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Badminton Booking System by HTML + JavaScript + Supabase</p>
  </footer>
</body>
</html>
