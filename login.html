<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 / 註冊 | 羽球臨打報名系統</title>
  <meta name="description" content="會員登入、管理者登入與會員註冊頁面。">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script defer src="app.js"></script>
</head>
<body data-page="login">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-badge">BT</span>
      <span>羽球臨打報名</span>
    </a>
    <nav class="site-nav">
      <a href="index.html">首頁</a>
      <a href="dashboard.html">會員中心</a>
      <a href="admin.html">管理後台</a>
      <a href="login.html" class="is-active">登入 / 註冊</a>
    </nav>
    <div class="auth-actions">
      <span id="navUserEmail" class="user-pill"></span>
      <button id="logoutButton" class="button button-secondary is-hidden" type="button">登出</button>
    </div>
  </header>

  <main class="page-shell auth-shell">
    <section class="auth-panel glass-card">
      <div class="section-header stacked">
        <div>
          <p class="eyebrow">Account Access</p>
          <h1>會員登入與管理者登入</h1>
        </div>
        <p>以 Email / 密碼登入系統。管理者需具備 `profiles.is_admin = true` 權限。</p>
      </div>

      <div class="auth-tabs">
        <button type="button" class="tab-button is-active" data-auth-tab="member">會員登入</button>
        <button type="button" class="tab-button" data-auth-tab="admin">管理者登入</button>
      </div>

      <div class="auth-grid">
        <form id="loginForm" class="form-card">
          <input id="loginMode" type="hidden" value="member">
          <label>
            <span>Email</span>
            <input id="loginEmail" type="email" placeholder="name@example.com" required>
          </label>
          <label>
            <span>密碼</span>
            <input id="loginPassword" type="password" placeholder="至少 6 碼" required>
          </label>
          <button class="button" type="submit">登入系統</button>
        </form>

        <form id="registerForm" class="form-card">
          <label>
            <span>姓名</span>
            <input id="registerName" type="text" placeholder="王小明" required>
          </label>
          <label>
            <span>Email</span>
            <input id="registerEmail" type="email" placeholder="name@example.com" required>
          </label>
          <label>
            <span>密碼</span>
            <input id="registerPassword" type="password" placeholder="至少 6 碼" required>
          </label>
          <button class="button button-secondary" type="submit">註冊會員</button>
        </form>
      </div>

      <div id="authMessage" class="message-box"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Badminton Booking System by HTML + JavaScript + Supabase</p>
  </footer>
</body>
</html>
